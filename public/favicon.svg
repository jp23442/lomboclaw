<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="bolt" x1="245" y1="80" x2="265" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Left pincer arm - thick curved claw -->
  <path d="M95 115 C95 185, 125 225, 165 250 C185 262, 200 268, 218 275"
        stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Left pincer tip - the grabby part -->
  <path d="M95 115 C115 95, 145 92, 170 108 C188 120, 192 138, 185 155"
        stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right pincer arm -->
  <path d="M417 115 C417 185, 387 225, 347 250 C327 262, 312 268, 294 275"
        stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right pincer tip -->
  <path d="M417 115 C397 95, 367 92, 342 108 C324 120, 320 138, 327 155"
        stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Lightning bolt - fat filled polygon -->
  <polygon points="285,95 222,260 272,260 205,420 235,420 302,245 252,245 300,95"
           fill="url(#bolt)"/>

  <!-- Lobster body segments -->
  <ellipse cx="256" cy="340" rx="50" ry="22" stroke="white" stroke-width="18" fill="none"/>
  <ellipse cx="256" cy="375" rx="42" ry="18" stroke="white" stroke-width="16" fill="none"/>

  <!-- Tail fan -->
  <path d="M214 400 C225 435, 245 450, 256 455 C267 450, 287 435, 298 400"
        stroke="white" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M230 410 C240 440, 250 448, 256 450 C262 448, 272 440, 282 410"
        stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Antennae -->
  <path d="M215 275 C185 250, 160 220, 135 180" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M297 275 C327 250, 352 220, 377 180" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
